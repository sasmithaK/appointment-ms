name: Doctor Service CI/CD

on:
  push:
    branches: [ "main", "master", "dev", "feature/**" ]
    paths:
      - 'doctor-service/**'
      - 'pom.xml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: ./mvnw clean package -pl doctor-service -am

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/doctor-service:latest -f doctor-service/Dockerfile .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/doctor-service:latest
