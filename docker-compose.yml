services:
  mongodb:
    image: mongo:latest
    container_name: appointment-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - appointment-network

  mongo-express:
    image: mongo-express
    ports:
      - "8085:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
    depends_on:
      - mongodb
    networks:
      - appointment-network
    volumes:
      - mongodb-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=userdb

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - USER_SERVICE_URL=http://user-service:8081
      - BOOKING_SERVICE_URL=http://booking-service:8082
      - NOTIFICATION_SERVICE_URL=http://notification-service:8083
      - APPOINTMENT_SERVICE_URL=http://appointment-service:8084
    networks:
      - appointment-network
    depends_on:
      - user-service
      - booking-service
      - notification-service
      - appointment-service

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - appointment-network
    depends_on:
      - mongodb
    environment:
      - SPRING_MONGODB_URI=mongodb://mongodb:27017/userdb

  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - appointment-network
    depends_on:
      - mongodb

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - appointment-network

  appointment-service:
    build:
      context: .
      dockerfile: appointment-service/Dockerfile
    ports:
      - "8084:8084"
