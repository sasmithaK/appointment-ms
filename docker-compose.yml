services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - appointment-network

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      - USER_SERVICE_URL=http://user-service:8081
      - BOOKING_SERVICE_URL=http://booking-service:8082
      - NOTIFICATION_SERVICE_URL=http://notification-service:8083
      - APPOINTMENT_SERVICE_URL=http://appointment-service:8084
    networks:
      - appointment-network
    depends_on:
      - user-service
      - booking-service
      - notification-service
      - appointment-service

  user-service:
    build: ./user-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/userdb
    networks:
      - appointment-network
    depends_on:
      - mongodb

  booking-service:
    build: ./booking-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/bookingdb
    networks:
      - appointment-network
    depends_on:
      - mongodb

  notification-service:
    build: ./notification-service
    ports:
      - "8083:8083"
    networks:
      - appointment-network

  appointment-service:
    build: ./appointment-service
    ports:
      - "8084:8084"
    networks:
      - appointment-network

networks:
  appointment-network:
    driver: bridge
