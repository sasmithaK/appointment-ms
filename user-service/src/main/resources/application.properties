# Metadata
spring.application.name=user-service
server.port=8081

# Database
spring.data.mongodb.uri=mongodb://localhost:27017/userdb

# JWT Configuration
jwt.secret=mySecretKey123456789012345678901234567890SecureKeyForJWT
jwt.expiration=86400000

# Logging
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Service URLs
booking.service.url=http://localhost:8082
notification.service.url=http://localhost:8083
appointment.service.url=http://localhost:8084
